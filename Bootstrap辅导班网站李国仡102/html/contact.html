<!-- 回到顶部按钮 JS -->
<script>
let topBtn = null;
window.onscroll = function () {
  if (!topBtn) {
    topBtn = document.createElement("button");
    topBtn.className = "btn btn-primary fixed-bottom m-3 me-3 rounded-circle";
    topBtn.style.width = "50px";
    topBtn.style.height = "50px";
    topBtn.style.fontSize = "22px";
    topBtn.innerText = "↑";
    topBtn.onclick = () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    };
  }

  if (window.scrollY > 300) {
    if (!topBtn.parentNode) document.body.appendChild(topBtn);
  } else {
    if (topBtn.parentNode) topBtn.parentNode.removeChild(topBtn);
  }
};
</script>
